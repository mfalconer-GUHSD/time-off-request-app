name: Comp Time Notifications

# Runs every 15 minutes to send "new request" alerts — this replaces what
# would otherwise be Cloud Functions triggers, avoiding any requirement
# for a Google Cloud billing account.
#
# NOTE: GitHub disables scheduled workflows automatically after 60 days
# of repository inactivity. If notifications silently stop, push any
# commit (or manually re-enable the workflow under the Actions tab) to
# reset that clock. Worth a calendar reminder every couple of months.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install firebase-admin nodemailer

      - name: Send notifications
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
        run: node scripts/send-notifications.js
