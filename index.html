<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comp Time Tracker | West Hills Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: #F5F6F8; }
  .font-display { font-family: 'Libre Franklin', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #C7CCD6; border-radius: 4px; }

  .switch-track {
    width: 64px; height: 32px; border-radius: 9999px;
    background: #1E3A5F; position: relative; cursor: pointer;
    transition: background .25s ease; flex-shrink: 0;
  }
  .switch-track.is-manager { background: #0F766E; }
  .switch-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 26px; height: 26px; border-radius: 9999px; background: white;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
    transition: transform .25s ease;
  }
  .switch-track.is-manager .switch-thumb { transform: translateX(32px); }

  .badge { display:inline-flex; align-items:center; gap:6px; padding:2px 10px; border-radius:9999px; font-size:12px; font-weight:600; }
  .badge-pending { background:#FEF3C7; color:#92400E; }
  .badge-approved { background:#D1FAE5; color:#065F46; }
  .badge-rejected { background:#FEE2E2; color:#991B1B; }
  .badge-warn { background:#FFEDD5; color:#9A3412; }

  .tab-btn { padding:8px 16px; font-size:13px; font-weight:600; border-radius:9999px; transition:.15s; }
  .tab-btn.active { background:#1E3A5F; color:white; }
  .tab-btn:not(.active) { color:#475569; }
  .tab-btn:not(.active):hover { background:#EEF1F5; }

  .fade-in { animation: fadeIn .25s ease both; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px);} to { opacity:1; transform:none; } }

  @media (prefers-reduced-motion: reduce) {
    .switch-thumb, .switch-track, .fade-in { transition: none !important; animation: none !important; }
  }

  input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible {
    outline: 2px solid #1E3A5F; outline-offset: 2px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ---------------------------------------------------------
   Roster & constants (from West Hills Comp Time forms)
--------------------------------------------------------- */
const STORAGE_KEY = "comp_time_tracker_v1";

const RAW_ROSTER = [
  "BARAJAS, Guillermo","BROWN, Carrie","CRENSHAW, Pamela","CRUSE, Ronnie","EDINGTON, Silvia",
  "GRANT, Nick","HERMAN, Kelley","JOHNS, Therese","LANCASTER, Wendi","LONDON, Quentin",
  "MATEUS, Diana","MENGES, Todd","NOVICIO, Bert","OBREGON, Chloe","PELLEGRINI, Ruth",
  "PHILLIPS, Pete","PITONES, Sarita","PUDIL, Heather","RALEY, Katie","RAWLEY, Leroy",
  "RAY, Anna","RODRIGUEZ, Erick","SAMPLES, Reagan","SCHAUFLER, Cyndel","SCHILLING, Amy",
  "SKALNIK, Kelly","SOTO, Norma","STEVESON, Cassidy","STORTON, Adrienne","SYKOWSKI, James",
  "TERRY, Tammy","UNDERWOOD, Lori","VILLA, Jacobo","VILLASANA, Cassandra","VINEYARD, Shawn",
  "WHEATON, Kyle","WHITEMAN, John",
];

function toDisplayName(lastCommaFirst) {
  const [last, first] = lastCommaFirst.split(",").map(s => s.trim());
  return `${first} ${last}`;
}

const ROSTER = RAW_ROSTER.map(raw => ({ id: raw, name: toDisplayName(raw) }))
  .sort((a,b) => a.name.localeCompare(b.name));

const ADMINS = ["April Baker", "Lindsay Abbott", "John Hoadley", "Brie Pagano", "Abby Fazekas"];

const MAX_ACCRUAL_HOURS = 24;
const SUBMIT_WITHIN_DAYS = 5;   // working days
const EXPIRES_AFTER_MONTHS = 10;
const isoToday = new Date().toISOString().slice(0,10);

/* ---------------------------------------------------------
   Seed data — small realistic example set
--------------------------------------------------------- */
const seedEarned = [
  { id: "e1", employeeId: "SOTO, Norma", eventReason: "Back to School Night coverage", dateWorked: "2026-07-09", extraHours: 2, regularHours: 8, adminOverseeing: "April Baker", status: "approved", submittedAt: "2026-07-10T15:00:00Z", decidedAt: "2026-07-10T18:00:00Z", decidedBy: "April Baker" },
  { id: "e2", employeeId: "MENGES, Todd", eventReason: "Varsity football game supervision", dateWorked: "2026-07-17", extraHours: 3.5, regularHours: 8, adminOverseeing: "John Hoadley", status: "pending", submittedAt: "2026-07-18T13:20:00Z", decidedAt: null, decidedBy: null },
];

const seedUsed = [
  { id: "u1", employeeId: "SOTO, Norma", dateOfLeave: "2026-07-15", startTime: "13:00", endTime: "15:00", totalHours: 2, reason: "Personal appointment", status: "approved", submittedAt: "2026-07-12T09:00:00Z", decidedAt: "2026-07-12T14:00:00Z", decidedBy: "April Baker" },
];

const seedAuditLog = [
  { id: "a1", ts: "2026-07-10T15:00:00Z", actor: "Norma Soto", action: "Logged 2 comp hours earned (Back to School Night coverage)" },
  { id: "a2", ts: "2026-07-10T18:00:00Z", actor: "April Baker", action: "Approved Norma Soto's earned comp time (2 hrs)" },
  { id: "a3", ts: "2026-07-12T09:00:00Z", actor: "Norma Soto", action: "Requested to use 2 comp hours" },
  { id: "a4", ts: "2026-07-12T14:00:00Z", actor: "April Baker", action: "Approved Norma Soto's comp time usage (2 hrs)" },
  { id: "a5", ts: "2026-07-18T13:20:00Z", actor: "Todd Menges", action: "Logged 3.5 comp hours earned (Varsity football game supervision)" },
];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { earned: seedEarned, used: seedUsed, auditLog: seedAuditLog, currentUserId: null };
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ---------------------------------------------------------
   Helpers
--------------------------------------------------------- */
function uid(prefix) { return prefix + "_" + Math.random().toString(36).slice(2, 9); }

function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function fmtDateTime(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}
function fmtTime(t) {
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  const period = h >= 12 ? "PM" : "AM";
  const h12 = ((h + 11) % 12) + 1;
  return `${h12}:${String(m).padStart(2,"0")} ${period}`;
}
function hoursBetween(startTime, endTime, tookLunch) {
  const [sh, sm] = startTime.split(":").map(Number);
  const [eh, em] = endTime.split(":").map(Number);
  const mins = (eh * 60 + em) - (sh * 60 + sm);
  let hours = Math.round((mins / 60) * 4) / 4; // nearest quarter hour
  if (hours >= 5 && tookLunch) hours -= 0.5; // unpaid 30-min lunch on 5+ hour days
  return Math.round(hours * 4) / 4;
}
function addMonths(dateISO, months) {
  const d = new Date(dateISO + "T00:00:00");
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0,10);
}
function countWorkingDaysBetween(startISO, endISO) {
  let count = 0;
  let d = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  while (d < end) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if (day !== 0 && day !== 6) count++;
  }
  return count;
}

/* ---------------------------------------------------------
   Shared UI bits
--------------------------------------------------------- */
function StatusBadge({ status }) {
  const map = {
    pending:  { cls: "badge-pending",  label: "Pending" },
    approved: { cls: "badge-approved", label: "Approved" },
    rejected: { cls: "badge-rejected", label: "Rejected" },
  };
  const m = map[status] || map.pending;
  return <span className={`badge ${m.cls}`}>{m.label}</span>;
}

function BalanceCard({ label, value, unit, accent, warn }) {
  return (
    <div className="bg-white rounded-xl border border-slate-200 p-5 flex-1 min-w-[160px]">
      <p className="text-xs font-semibold uppercase tracking-wide text-slate-500">{label}</p>
      <p className="font-display text-3xl font-bold mt-1" style={{color: accent}}>{value}</p>
      <p className={`text-xs mt-0.5 ${warn ? "text-orange-600 font-semibold" : "text-slate-400"}`}>{unit}</p>
    </div>
  );
}

function ContractBanner() {
  return (
    <div className="bg-indigo-50 border border-indigo-200 rounded-xl px-5 py-3 text-xs text-indigo-900 leading-relaxed">
      <span className="font-semibold">Contract rules:</span> Comp time must be pre-approved by administration before it's worked.
      Submit within {SUBMIT_WITHIN_DAYS} working days of the date worked. Employees may not accrue more than {MAX_ACCRUAL_HOURS} hours.
      Comp time must be used within {EXPIRES_AFTER_MONTHS} months of the date it was earned.
    </div>
  );
}

/* ---------------------------------------------------------
   Login (name-based, stands in for Google SSO)
--------------------------------------------------------- */
function LoginScreen({ onLogin }) {
  const [selected, setSelected] = useState("");
  return (
    <div className="min-h-screen flex items-center justify-center bg-[#1E3A5F] px-6">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm fade-in">
        <h1 className="font-display text-xl font-bold text-slate-800 mb-1">Comp Time Tracker</h1>
        <p className="text-sm text-slate-500 mb-6">West Hills Staff — sign in to continue</p>
        <label className="block text-xs font-semibold text-slate-600 mb-1">Select your name</label>
        <select
          value={selected}
          onChange={e => setSelected(e.target.value)}
          className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white mb-4"
        >
          <option value="">Choose…</option>
          {ROSTER.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
        <button
          disabled={!selected}
          onClick={() => selected && onLogin(selected)}
          className="w-full bg-[#1E3A5F] disabled:opacity-40 hover:bg-[#16304f] text-white font-semibold text-sm rounded-lg py-2.5 transition-colors"
        >
          Continue
        </button>
        <p className="text-xs text-slate-400 mt-4 text-center">
          Prototype login — will be replaced with Google Sign-In (@guhsd.net) for production use.
        </p>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Employee View
--------------------------------------------------------- */
function EmployeeView({ employeeId, employeeName, earned, used, onSubmitEarned, onSubmitUsed }) {
  const [tab, setTab] = useState("earned");
  const [error, setError] = useState("");

  const myEarned = useMemo(
    () => earned.filter(r => r.employeeId === employeeId).sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)),
    [earned, employeeId]
  );
  const myUsed = useMemo(
    () => used.filter(r => r.employeeId === employeeId).sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)),
    [used, employeeId]
  );

  const approvedEarnedHours = myEarned.filter(r => r.status === "approved").reduce((s,r) => s + r.extraHours, 0);
  const pendingEarnedHours = myEarned.filter(r => r.status === "pending").reduce((s,r) => s + r.extraHours, 0);
  const approvedUsedHours = myUsed.filter(r => r.status === "approved").reduce((s,r) => s + r.totalHours, 0);
  const pendingUsedHours = myUsed.filter(r => r.status === "pending").reduce((s,r) => s + r.totalHours, 0);
  const availableBalance = Math.max(0, approvedEarnedHours - approvedUsedHours);

  const expiringSoon = myEarned
    .filter(r => r.status === "approved")
    .map(r => ({...r, expiresOn: addMonths(r.dateWorked, EXPIRES_AFTER_MONTHS)}))
    .filter(r => {
      const days = (new Date(r.expiresOn) - new Date()) / 86400000;
      return days > 0 && days <= 30;
    });

  /* --- Earned form state --- */
  const [eDate, setEDate] = useState("");
  const [eReason, setEReason] = useState("");
  const [eExtraHours, setEExtraHours] = useState("");
  const [eRegularHours, setERegularHours] = useState("");
  const [eAdmin, setEAdmin] = useState("");

  function submitEarned(ev) {
    ev.preventDefault();
    setError("");
    if (!eDate || !eReason.trim() || !eExtraHours || eRegularHours === "" || !eAdmin) {
      setError("Please complete every field before submitting.");
      return;
    }
    const extraHours = parseFloat(eExtraHours);
    const regularHours = parseFloat(eRegularHours);
    if (isNaN(extraHours) || extraHours <= 0) {
      setError("Extra hours worked must be a positive number (e.g. 1.75).");
      return;
    }
    if (isNaN(regularHours) || regularHours < 0) {
      setError("Regular work hours must be zero or a positive number.");
      return;
    }
    const projectedTotal = approvedEarnedHours + pendingEarnedHours + extraHours - approvedUsedHours;
    if (projectedTotal > MAX_ACCRUAL_HOURS) {
      setError(`This would put your accrued balance over the ${MAX_ACCRUAL_HOURS}-hour contract limit. Talk to your admin before submitting.`);
      return;
    }

    onSubmitEarned({
      id: uid("e"),
      employeeId,
      eventReason: eReason.trim(),
      dateWorked: eDate,
      extraHours,
      regularHours,
      adminOverseeing: eAdmin,
      status: "pending",
      submittedAt: new Date().toISOString(),
      decidedAt: null,
      decidedBy: null,
    });
    setEDate(""); setEReason(""); setEExtraHours(""); setERegularHours(""); setEAdmin("");
  }

  /* --- Used form state --- */
  const [uDate, setUDate] = useState("");
  const [uStart, setUStart] = useState("");
  const [uEnd, setUEnd] = useState("");
  const [uReason, setUReason] = useState("");
  const [uTookLunch, setUTookLunch] = useState(true);

  const rawUsedSpan = (uStart && uEnd) ? hoursBetween(uStart, uEnd, false) : null;
  const computedUsedHours = (uStart && uEnd) ? hoursBetween(uStart, uEnd, uTookLunch) : null;
  const lunchApplies = rawUsedSpan !== null && rawUsedSpan >= 5;

  function submitUsed(ev) {
    ev.preventDefault();
    setError("");
    if (!uDate || !uStart || !uEnd) {
      setError("Please choose a date, start time, and end time.");
      return;
    }
    if (uEnd <= uStart) {
      setError("End time must be after the start time.");
      return;
    }
    const totalHours = hoursBetween(uStart, uEnd, uTookLunch);
    if (totalHours <= 0) {
      setError("Please select a valid time range.");
      return;
    }
    if (totalHours > availableBalance) {
      setError(`You only have ${availableBalance} comp hour${availableBalance === 1 ? "" : "s"} available.`);
      return;
    }

    onSubmitUsed({
      id: uid("u"),
      employeeId,
      dateOfLeave: uDate,
      startTime: uStart,
      endTime: uEnd,
      totalHours,
      reason: uReason.trim() || "—",
      status: "pending",
      submittedAt: new Date().toISOString(),
      decidedAt: null,
      decidedBy: null,
    });
    setUDate(""); setUStart(""); setUEnd(""); setUReason(""); setUTookLunch(true);
  }

  return (
    <div className="fade-in space-y-6">
      <div>
        <h2 className="font-display text-2xl font-bold text-slate-800">Welcome back, {employeeName.split(" ")[0]}</h2>
        <p className="text-sm text-slate-500">Comp time balance &amp; requests</p>
      </div>

      <ContractBanner />

      <div className="flex flex-wrap gap-4">
        <BalanceCard label="Available comp time" value={availableBalance} unit="hours to use" accent="#1E3A5F" />
        <BalanceCard label="Pending earned" value={pendingEarnedHours} unit="awaiting approval" accent="#92400E" />
        <BalanceCard label="Pending usage requests" value={pendingUsedHours} unit="awaiting approval" accent="#0F766E" />
        <BalanceCard
          label="Expiring within 30 days"
          value={expiringSoon.reduce((s,r) => s + r.extraHours, 0)}
          unit={expiringSoon.length ? "hours — use them soon" : "hours"}
          accent="#B45309"
          warn={expiringSoon.length > 0}
        />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
        {/* Forms */}
        <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-6 h-fit">
          <div className="flex gap-2 mb-4">
            <button className={`tab-btn ${tab === "earned" ? "active" : ""}`} onClick={() => { setTab("earned"); setError(""); }}>Log time earned</button>
            <button className={`tab-btn ${tab === "used" ? "active" : ""}`} onClick={() => { setTab("used"); setError(""); }}>Request to use</button>
          </div>

          {tab === "earned" ? (
            <form onSubmit={submitEarned} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Date of activity/event worked</label>
                <input type="date" value={eDate} max={isoToday} onChange={e => setEDate(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Name of event worked / reason for comp time</label>
                <input type="text" value={eReason} onChange={e => setEReason(e.target.value)} placeholder="Please provide name/reason only — no dates" className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Extra hours worked</label>
                  <input type="number" step="0.25" min="0" value={eExtraHours} onChange={e => setEExtraHours(e.target.value)} placeholder="e.g. 1.75" className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Regular hours worked that day</label>
                  <input type="number" step="0.25" min="0" value={eRegularHours} onChange={e => setERegularHours(e.target.value)} placeholder="e.g. 8" className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
                </div>
              </div>
              <p className="text-xs text-slate-400 -mt-2">15 min = 0.25 · 30 min = 0.50 · 45 min = 0.75 · 1 hr = 1. If you worked 5+ hours without an unpaid 30-min lunch, add 0.50.</p>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Admin overseeing activity/event</label>
                <select value={eAdmin} onChange={e => setEAdmin(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white" required>
                  <option value="">Choose…</option>
                  {ADMINS.map(a => <option key={a} value={a}>{a}</option>)}
                </select>
              </div>

              {error && <p className="text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">{error}</p>}

              <p className="text-xs text-slate-400">One entry per date of comp time earned. Please don't bundle multiple dates into a single submission.</p>

              <button type="submit" className="w-full bg-[#1E3A5F] hover:bg-[#16304f] text-white font-semibold text-sm rounded-lg py-2.5 transition-colors">
                Submit earned time
              </button>
            </form>
          ) : (
            <form onSubmit={submitUsed} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Date of leave</label>
                <input type="date" value={uDate} min={isoToday} onChange={e => setUDate(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Start time</label>
                  <input type="time" value={uStart} onChange={e => setUStart(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">End time</label>
                  <input type="time" value={uEnd} onChange={e => setUEnd(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
                </div>
              </div>
              <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-600">
                Total hours of leave: <span className="font-semibold text-slate-800">{computedUsedHours !== null ? computedUsedHours : "—"}</span>
                <span className="text-xs text-slate-400 block mt-0.5">Calculated automatically from start/end time, rounded to the nearest quarter hour.</span>
                {lunchApplies && (
                  <label className="flex items-center gap-2 text-xs text-slate-600 mt-2">
                    <input type="checkbox" checked={!uTookLunch} onChange={e => setUTookLunch(!e.target.checked)} />
                    I did not take an unpaid 30-minute lunch (don't subtract it)
                  </label>
                )}
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Reason (optional)</label>
                <textarea value={uReason} onChange={e => setUReason(e.target.value)} rows={2} placeholder="e.g. Personal appointment" className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm resize-none" />
              </div>
              <p className="text-xs text-slate-400">One entry per day of comp time used. If you need multiple days off, please submit a separate request for each date.</p>


              {error && <p className="text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">{error}</p>}

              <button type="submit" className="w-full bg-[#0F766E] hover:bg-[#0c5f58] text-white font-semibold text-sm rounded-lg py-2.5 transition-colors">
                Submit usage request
              </button>
            </form>
          )}
        </div>

        {/* History */}
        <div className="lg:col-span-3 space-y-6">
          <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div className="px-6 py-4 border-b border-slate-100">
              <h3 className="font-display font-bold text-slate-800">Time earned</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                    <th className="px-6 py-3 font-semibold">Date worked</th>
                    <th className="px-4 py-3 font-semibold">Reason</th>

/* ---------------------------------------------------------
   Manager View
--------------------------------------------------------- */
function ManagerView({ earned, used, auditLog, onApprove, onReject }) {
  const nameOf = (id) => (ROSTER.find(r => r.id === id) || {}).name || id;

  const pendingEarned = useMemo(
    () => earned.filter(r => r.status === "pending").sort((a,b) => new Date(a.submittedAt) - new Date(b.submittedAt)),
    [earned]
  );
  const pendingUsed = useMemo(
    () => used.filter(r => r.status === "pending").sort((a,b) => new Date(a.submittedAt) - new Date(b.submittedAt)),
    [used]
  );

  const balances = useMemo(() => {
    return ROSTER.map(person => {
      const eA = earned.filter(r => r.employeeId === person.id && r.status === "approved").reduce((s,r) => s + r.extraHours, 0);
      const uA = used.filter(r => r.employeeId === person.id && r.status === "approved").reduce((s,r) => s + r.totalHours, 0);
      const eP = earned.filter(r => r.employeeId === person.id && r.status === "pending").reduce((s,r) => s + r.extraHours, 0);
      const uP = used.filter(r => r.employeeId === person.id && r.status === "pending").reduce((s,r) => s + r.totalHours, 0);
      return { ...person, balance: Math.max(0, eA - uA), pendingEarned: eP, pendingUsed: uP };
    }).filter(p => p.balance > 0 || p.pendingEarned > 0 || p.pendingUsed > 0);
  }, [earned, used]);

  const sortedLog = useMemo(() => [...auditLog].sort((a,b) => new Date(b.ts) - new Date(a.ts)), [auditLog]);

  return (
    <div className="fade-in space-y-6">
      <div>
        <h2 className="font-display text-2xl font-bold text-slate-800">Manager dashboard</h2>
        <p className="text-sm text-slate-500">Review comp time requests and monitor staff balances.</p>
      </div>

      <div className="flex flex-wrap gap-4">
        <BalanceCard label="Pending earned entries" value={pendingEarned.length} unit="need review" accent="#92400E" />
        <BalanceCard label="Pending usage requests" value={pendingUsed.length} unit="need review" accent="#0F766E" />
        <BalanceCard label="Staff with a balance" value={balances.length} unit="tracked" accent="#1E3A5F" />
      </div>

      {/* Pending earned */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <h3 className="font-display font-bold text-slate-800">Pending — time earned</h3>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                <th className="px-6 py-3 font-semibold">Employee</th>
                <th className="px-4 py-3 font-semibold">Date worked</th>
                <th className="px-4 py-3 font-semibold">Reason</th>
                <th className="px-4 py-3 font-semibold">Hours</th>
                <th className="px-4 py-3 font-semibold">Admin</th>
                <th className="px-4 py-3 font-semibold">Submitted</th>
                <th className="px-6 py-3 font-semibold text-right">Action</th>
              </tr>
            </thead>
            <tbody>
              {pendingEarned.length === 0 && (
                <tr><td colSpan={7} className="px-6 py-8 text-center text-slate-400">No pending earned-time entries.</td></tr>
              )}
              {pendingEarned.map(r => {
                const late = countWorkingDaysBetween(r.dateWorked, r.submittedAt.slice(0,10)) > SUBMIT_WITHIN_DAYS;
                return (
                  <tr key={r.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
                    <td className="px-6 py-3 font-medium text-slate-800">{nameOf(r.employeeId)}</td>
                    <td className="px-4 py-3 text-slate-700 whitespace-nowrap">{fmtDate(r.dateWorked)}</td>
                    <td className="px-4 py-3 text-slate-500 max-w-[160px] truncate" title={r.eventReason}>{r.eventReason}</td>
                    <td className="px-4 py-3 text-slate-700">{r.extraHours}</td>
                    <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{r.adminOverseeing}</td>
                    <td className="px-4 py-3 whitespace-nowrap">
                      {fmtDateTime(r.submittedAt)}
                      {late && <span className="badge badge-warn ml-2">Late</span>}
                    </td>
                    <td className="px-6 py-3">
                      <div className="flex gap-2 justify-end">
                        <button onClick={() => onReject("earned", r.id)} className="text-xs font-semibold px-3 py-1.5 rounded-lg border border-rose-200 text-rose-700 hover:bg-rose-50 transition-colors">Reject</button>
                        <button onClick={() => onApprove("earned", r.id)} className="text-xs font-semibold px-3 py-1.5 rounded-lg bg-[#0F766E] text-white hover:bg-[#0c5f58] transition-colors">Approve</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Pending used */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <h3 className="font-display font-bold text-slate-800">Pending — time usage requests</h3>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                <th className="px-6 py-3 font-semibold">Employee</th>
                <th className="px-4 py-3 font-semibold">Date of leave</th>
                <th className="px-4 py-3 font-semibold">Time</th>
                <th className="px-4 py-3 font-semibold">Hours</th>
                <th className="px-4 py-3 font-semibold">Reason</th>
                <th className="px-6 py-3 font-semibold text-right">Action</th>
              </tr>
            </thead>
            <tbody>
              {pendingUsed.length === 0 && (
                <tr><td colSpan={6} className="px-6 py-8 text-center text-slate-400">No pending usage requests.</td></tr>
              )}
              {pendingUsed.map(r => (
                <tr key={r.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
                  <td className="px-6 py-3 font-medium text-slate-800">{nameOf(r.employeeId)}</td>
                  <td className="px-4 py-3 text-slate-700 whitespace-nowrap">{fmtDate(r.dateOfLeave)}</td>
                  <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{fmtTime(r.startTime)}–{fmtTime(r.endTime)}</td>
                  <td className="px-4 py-3 text-slate-700">{r.totalHours}</td>
                  <td className="px-4 py-3 text-slate-500 max-w-[140px] truncate" title={r.reason}>{r.reason}</td>
                  <td className="px-6 py-3">
                    <div className="flex gap-2 justify-end">
                      <button onClick={() => onReject("used", r.id)} className="text-xs font-semibold px-3 py-1.5 rounded-lg border border-rose-200 text-rose-700 hover:bg-rose-50 transition-colors">Reject</button>
                      <button onClick={() => onApprove("used", r.id)} className="text-xs font-semibold px-3 py-1.5 rounded-lg bg-[#0F766E] text-white hover:bg-[#0c5f58] transition-colors">Approve</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Staff balances */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <h3 className="font-display font-bold text-slate-800">Staff comp time balances</h3>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                <th className="px-6 py-3 font-semibold">Employee</th>
                <th className="px-4 py-3 font-semibold">Available</th>
                <th className="px-4 py-3 font-semibold">Pending earned</th>
                <th className="px-4 py-3 font-semibold">Pending usage</th>
              </tr>
            </thead>
            <tbody>
              {balances.length === 0 && (
                <tr><td colSpan={4} className="px-6 py-8 text-center text-slate-400">No activity yet.</td></tr>
              )}
              {balances.map(p => (
                <tr key={p.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
                  <td className="px-6 py-3 font-medium text-slate-800">{p.name}</td>
                  <td className="px-4 py-3 text-slate-700">
                    {p.balance}
                    {p.balance > MAX_ACCRUAL_HOURS * 0.9 && <span className="badge badge-warn ml-2">Near cap</span>}
                  </td>
                  <td className="px-4 py-3 text-slate-500">{p.pendingEarned || "—"}</td>
                  <td className="px-4 py-3 text-slate-500">{p.pendingUsed || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Audit log */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <h3 className="font-display font-bold text-slate-800">Audit log</h3>
        </div>
        <div className="overflow-x-auto max-h-80 overflow-y-auto">
          <table className="w-full text-sm">
            <thead className="sticky top-0 bg-white">
              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                <th className="px-6 py-3 font-semibold">When</th>
                <th className="px-4 py-3 font-semibold">Actor</th>
                <th className="px-4 py-3 font-semibold">Action</th>
              </tr>
            </thead>
            <tbody>
              {sortedLog.map(entry => (
                <tr key={entry.id} className="border-b border-slate-50 last:border-0">
                  <td className="px-6 py-3 text-slate-500 whitespace-nowrap">{fmtDateTime(entry.ts)}</td>
                  <td className="px-4 py-3 font-medium text-slate-700 whitespace-nowrap">{entry.actor}</td>
                  <td className="px-4 py-3 text-slate-600">{entry.action}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Top nav
--------------------------------------------------------- */
function TopBar({ view, setView, employeeName, onSwitchUser }) {
  const isManager = view === "manager";
  return (
    <div className="bg-[#1E3A5F] text-white">
      <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 className="font-display text-lg font-bold leading-tight">Comp Time Tracker</h1>
          <p className="text-xs text-white/60">West Hills Staff — earned &amp; used hours</p>
        </div>
        <div className="flex items-center gap-4">
          <div className="flex items-center gap-3">
            <span className={`text-sm font-medium ${!isManager ? "text-white" : "text-white/50"}`}>Employee</span>
            <div
              className={`switch-track ${isManager ? "is-manager" : ""}`}
              role="switch" aria-checked={isManager} tabIndex={0}
              onClick={() => setView(isManager ? "employee" : "manager")}
              onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setView(isManager ? "employee" : "manager"); } }}
            >
              <div className="switch-thumb"></div>
            </div>
            <span className={`text-sm font-medium ${isManager ? "text-white" : "text-white/50"}`}>Manager</span>
          </div>
          <div className="h-5 w-px bg-white/20"></div>
          <div className="text-xs text-white/70">
            {employeeName} · <button onClick={onSwitchUser} className="underline hover:text-white">Switch user</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Root App
--------------------------------------------------------- */
function App() {
  const initial = loadState();
  const [currentUserId, setCurrentUserId] = useState(initial.currentUserId);
  const [earned, setEarned] = useState(initial.earned);
  const [used, setUsed] = useState(initial.used);
  const [auditLog, setAuditLog] = useState(initial.auditLog);
  const [view, setView] = useState("employee");

  useEffect(() => {
    saveState({ earned, used, auditLog, currentUserId });
  }, [earned, used, auditLog, currentUserId]);

  const currentName = useMemo(() => (ROSTER.find(r => r.id === currentUserId) || {}).name || "", [currentUserId]);

  const handleSubmitEarned = useCallback((entry) => {
    setEarned(prev => [...prev, entry]);
    setAuditLog(prev => [...prev, {
      id: uid("a"), ts: entry.submittedAt, actor: currentName,
      action: `Logged ${entry.extraHours} comp hours earned (${entry.eventReason})`,
    }]);
  }, [currentName]);

  const handleSubmitUsed = useCallback((entry) => {
    setUsed(prev => [...prev, entry]);
    setAuditLog(prev => [...prev, {
      id: uid("a"), ts: entry.submittedAt, actor: currentName,
      action: `Requested to use ${entry.totalHours} comp hours`,
    }]);
  }, [currentName]);

  const decide = useCallback((kind, id, newStatus) => {
    const setter = kind === "earned" ? setEarned : setUsed;
    setter(prevList => {
      const target = prevList.find(r => r.id === id);
      if (!target || target.status !== "pending") return prevList;
      const decidedAt = new Date().toISOString();
      const empName = (ROSTER.find(r => r.id === target.employeeId) || {}).name || target.employeeId;
      const hours = kind === "earned" ? target.extraHours : target.totalHours;
      const verb = newStatus === "approved" ? "Approved" : "Rejected";
      const noun = kind === "earned" ? "earned comp time" : "comp time usage";
      setAuditLog(prevLog => [...prevLog, {
        id: uid("a"), ts: decidedAt, actor: "Admin",
        action: `${verb} ${empName}'s ${noun} (${hours} hrs)`,
      }]);
      return prevList.map(r => r.id === id ? { ...r, status: newStatus, decidedAt, decidedBy: "Admin" } : r);
    });
  }, []);

  const handleApprove = useCallback((kind, id) => decide(kind, id, "approved"), [decide]);
  const handleReject = useCallback((kind, id) => decide(kind, id, "rejected"), [decide]);

  if (!currentUserId) {
    return <LoginScreen onLogin={(id) => setCurrentUserId(id)} />;
  }

  return (
    <div className="min-h-screen">
      <TopBar view={view} setView={setView} employeeName={currentName} onSwitchUser={() => setCurrentUserId(null)} />
      <main className="max-w-6xl mx-auto px-6 py-8">
        {view === "employee" ? (
          <EmployeeView
            employeeId={currentUserId}
            employeeName={currentName}
            earned={earned}
            used={used}
            onSubmitEarned={handleSubmitEarned}
            onSubmitUsed={handleSubmitUsed}
          />
        ) : (
          <ManagerView earned={earned} used={used} auditLog={auditLog} onApprove={handleApprove} onReject={handleReject} />
        )}
      </main>
      <footer className="max-w-6xl mx-auto px-6 pb-8 text-xs text-slate-400">
        Data is stored locally in this browser for demo purposes — no server required.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
