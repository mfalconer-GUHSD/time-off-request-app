function roundToQuarter(n) { return Math.round(n * 4) / 4; }
/**
 * Comp time earned calculation:
 *  - If the date worked falls on a weekend (Sat/Sun), the entire extra-hours
 *    amount is time-and-a-half — a weekend premium, independent of the
 *    8-hour threshold below.
 *  - Otherwise, standard daily overtime: only the portion of the day's
 *    TOTAL hours (regular + extra) that falls beyond 8 hours is time-and-a-
 *    half; the rest is straight time. E.g. 6 regular + 3 extra = 9 total,
 *    so 1 hour is OT (9-8) and 2 hours are straight time.
 * Computed client-side (no Cloud Function on the free plan); Firestore
 * rules apply a bounds check as a backstop, not an exact recomputation,
 * since day-of-week/date branching isn't practical to replicate in rules.
 */
function computeCompHours(extraHours, regularHours, dateWorkedStr) {
  const d = new Date(dateWorkedStr + "T00:00:00");
  const dayOfWeek = d.getDay(); // 0 = Sunday, 6 = Saturday
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

  let otHours, straightHours, explanation;

  if (isWeekend) {
    otHours = extraHours;
    straightHours = 0;
    explanation = `Calculated at time-and-a-half because ${fmtDate(dateWorkedStr)} falls on a weekend.`;
  } else {
    const totalHoursThatDay = regularHours + extraHours;
    if (totalHoursThatDay > 8) {
      otHours = Math.min(extraHours, roundToQuarter(totalHoursThatDay - 8));
      straightHours = roundToQuarter(extraHours - otHours);
    } else {
      otHours = 0;
      straightHours = extraHours;
    }
    if (otHours > 0 && straightHours > 0) {
      explanation = `${straightHours} hour(s) at straight time and ${otHours} hour(s) at time-and-a-half, because total hours worked that day (${totalHoursThatDay}) exceeded 8.`;
    } else if (otHours > 0) {
      explanation = `Calculated at time-and-a-half because total hours worked that day (${totalHoursThatDay}) exceeded 8.`;
    } else {
      explanation = `Calculated at straight time — total hours worked that day (${totalHoursThatDay}) did not exceed 8.`;
    }
  }

  const compHoursExact = otHours * 1.5 + straightHours * 1.0;
  return {
    otApplied: otHours > 0, otHours, straightHours,
    compHoursExact, compHoursRounded: roundToQuarter(compHoursExact),
    calcExplanation: explanation,
  };
}

/* ---------------------------------------------------------
   Helpers
--------------------------------------------------------- */
function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function fmtDateTime(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
}
function fmtTime(t) {
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  const period = h >= 12 ? "PM" : "AM";
  const h12 = ((h + 11) % 12) + 1;
  return `${h12}:${String(m).padStart(2,"0")} ${period}`;
}
function hoursBetween(startTime, endTime, tookLunch) {
  const [sh, sm] = startTime.split(":").map(Number);
  const [eh, em] = endTime.split(":").map(Number);
  const mins = (eh * 60 + em) - (sh * 60 + sm);
  let hours = Math.round((mins / 60) * 4) / 4;
  if (hours >= 5 && tookLunch) hours -= 0.5;
  return Math.round(hours * 4) / 4;
}
function toDateSafe(v) {
  if (!v) return null;
  return v.toDate ? v.toDate() : new Date(v);
}
function countWorkingDaysBetween(startISO, endISO) {
  let count = 0;
  let d = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  while (d < end) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if (day !== 0 && day !== 6) count++;
  }
  return count;
}
function toCsv(rows, headers) {
  const escapeCell = (val) => {
    const s = String(val ?? "");
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [headers.map(h => escapeCell(h.label)).join(",")];
  rows.forEach(row => lines.push(headers.map(h => escapeCell(h.get(row))).join(",")));
  return lines.join("\n");
}
function downloadCsv(filename, csvText) {
  const blob = new Blob([csvText], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  };
  const m = map[status] || map.pending;
  return <span className={`badge ${m.cls}`}>{m.label}</span>;
}

        {" "}<a href="https://www.guhsd.net/Departments/Human-Resources/Bargaining-Unit-Contracts/index.html" target="_blank" rel="noopener noreferrer" className="underline font-semibold">See CSEA/SEIU contracts</a>.

/* ---------------------------------------------------------
   Login — Google Sign-In restricted to the district domain
--------------------------------------------------------- */
function LoginScreen({ onError }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  async function handleGoogleSignIn() {
    setBusy(true);
    setError("");
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ hd: DISTRICT_DOMAIN }); // hints the account chooser only — real enforcement is server-side
    try {
      const result = await auth.signInWithPopup(provider);
      const email = (result.user.email || "").toLowerCase();
      if (!email.endsWith("@" + DISTRICT_DOMAIN)) {
        await auth.signOut();
        setError(`Please sign in with your @${DISTRICT_DOMAIN} account.`);
      }
    } catch (e) {
      setError(e.message || "Sign-in failed. Please try again.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-[#1E3A5F] px-6">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm fade-in text-center">
        <h1 className="font-display text-xl font-bold text-slate-800 mb-1">Comp Time Tracker</h1>
        <p className="text-sm text-slate-500 mb-6">Sign in with your district Google account</p>
        <button
          onClick={handleGoogleSignIn}
          disabled={busy}
          className="w-full bg-[#1E3A5F] disabled:opacity-40 hover:bg-[#16304f] text-white font-semibold text-sm rounded-lg py-2.5 transition-colors"
        >
          {busy ? "Signing in…" : `Sign in with @${DISTRICT_DOMAIN} Google account`}
        </button>
        {error && <p className="text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2 mt-4">{error}</p>}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Employee View
--------------------------------------------------------- */
function EmployeeView({ me, earned, used, managers, onSubmitEarned, onSubmitUsed }) {
  const [tab, setTab] = useState("earned");
  const [error, setError] = useState("");

  const today = new Date();

  const approvedEarned = earned.filter(r => r.status === "approved");
  const pendingEarnedHours = earned.filter(r => r.status === "pending").reduce((s,r) => s + (r.compHoursRounded || r.extraHours || 0), 0);
  const pendingUsedHours = used.filter(r => r.status === "pending").reduce((s,r) => s + (r.totalHours || 0), 0);

  // Oldest-first breakdown of remaining earned batches. No expiration —
  // comp time rolls over indefinitely as long as the balance stays at or
  // under the 24-hour cap (per contract).
  const breakdown = approvedEarned
    .filter(r => (r.remainingHours || 0) > 0)
    .sort((a,b) => new Date(a.dateWorked) - new Date(b.dateWorked));

  const availableBalance = Math.round(breakdown.reduce((s,r) => s + (r.remainingHours || 0), 0) * 4) / 4;

  /* --- Earned form --- */
  const [eDate, setEDate] = useState("");
  const [eReason, setEReason] = useState("");
  const [eExtraHours, setEExtraHours] = useState("");
  const [eRegularHours, setERegularHours] = useState("");
  const [eManagerId, setEManagerId] = useState("");
  const [ePreApproved, setEPreApproved] = useState(false);
  const eLate = eDate ? countWorkingDaysBetween(eDate, isoToday) > SUBMIT_WITHIN_DAYS : false;

  const eExtraNum = parseFloat(eExtraHours);
  const eRegularNum = parseFloat(eRegularHours);
  const livePreview = (eDate && !isNaN(eExtraNum) && eExtraNum > 0 && !isNaN(eRegularNum) && eRegularNum >= 0)
    ? computeCompHours(eExtraNum, eRegularNum, eDate)
    : null;

  const canSubmitEarned = eDate && eReason.trim() && eExtraHours && eRegularHours !== "" && eManagerId && ePreApproved;

  async function submitEarned(ev) {
    ev.preventDefault();
    setError("");

    if (!eDate || !eReason.trim() || !eExtraHours || eRegularHours === "" || !eManagerId) {
      setError("Please complete every field before submitting.");
      return;
    }
    if (!ePreApproved) {
      setError("Please confirm this activity was pre-approved by administration before it was worked.");
      return;
    }
    const extraHours = parseFloat(eExtraHours);
    const regularHours = parseFloat(eRegularHours);
    if (isNaN(extraHours) || extraHours <= 0) { setError("Extra hours worked must be a positive number."); return; }
    if (isNaN(regularHours) || regularHours < 0) { setError("Regular hours must be zero or positive."); return; }

    // Client-computed — Firestore rules apply a bounds-check backstop since
    // there's no Cloud Function to recompute the weekend/8-hour logic server-side.
    const { otApplied, compHoursExact, compHoursRounded, calcExplanation } = computeCompHours(extraHours, regularHours, eDate);
    const projected = availableBalance + pendingEarnedHours + compHoursRounded;
    if (projected > MAX_ACCRUAL_HOURS) {
      setError(`This would put your accrued balance over the ${MAX_ACCRUAL_HOURS}-hour contract limit. Talk to your admin before submitting.`);
      return;
    }

    await onSubmitEarned({
      eventReason: eReason.trim(), dateWorked: eDate, extraHours, regularHours,
      otApplied, compHoursExact, compHoursRounded, remainingHours: compHoursRounded, calcExplanation,
      adminOverseeingUserId: eManagerId, preApproved: ePreApproved, isStartingBalance: false,
      managerNotified: false,
    });
    setEDate(""); setEReason(""); setEExtraHours(""); setERegularHours(""); setEManagerId(""); setEPreApproved(false);
  }

  /* --- Used form --- */
  const [uDate, setUDate] = useState("");
  const [uStart, setUStart] = useState("");
  const [uEnd, setUEnd] = useState("");
  const [uReason, setUReason] = useState("");
  const [uTookLunch, setUTookLunch] = useState(true);
  const [uManagerId, setUManagerId] = useState("");

  const rawSpan = (uStart && uEnd) ? hoursBetween(uStart, uEnd, false) : null;
  const computedUsedHours = (uStart && uEnd) ? hoursBetween(uStart, uEnd, uTookLunch) : null;
  const lunchApplies = rawSpan !== null && rawSpan >= 5;
  const shortNotice = uDate ? ((new Date(uDate) - today) / 86400000) < 14 : false;

  async function submitUsed(ev) {
    ev.preventDefault();
    setError("");
    if (!uDate || !uStart || !uEnd || !uManagerId) { setError("Please complete every field."); return; }
    if (uEnd <= uStart) { setError("End time must be after the start time."); return; }
    const totalHours = hoursBetween(uStart, uEnd, uTookLunch);
    if (totalHours <= 0) { setError("Please select a valid time range."); return; }
    if (totalHours > availableBalance) { setError(`You only have ${availableBalance} comp hours available.`); return; }

    await onSubmitUsed({
      dateOfLeave: uDate, startTime: uStart, endTime: uEnd, totalHours,
      reason: uReason.trim() || "—", adminOverseeingUserId: uManagerId,
      managerNotified: false,
    });
    setUDate(""); setUStart(""); setUEnd(""); setUReason(""); setUTookLunch(true); setUManagerId("");
  }

  return (
    <div className="fade-in space-y-6">
      <div>
        <h2 className="font-display text-2xl font-bold text-slate-800">Welcome back, {me.name.split(" ")[0]}</h2>
        <p className="text-sm text-slate-500">{me.school}</p>
      </div>

      <ContractBanner />

      <div className="flex flex-wrap gap-4">
        <BalanceCard label="Available comp time" value={availableBalance} unit="hours to use" accent="#1E3A5F" />
        <BalanceCard label="Pending earned" value={pendingEarnedHours} unit="awaiting approval" accent="#92400E" />
        <BalanceCard label="Pending usage requests" value={pendingUsedHours} unit="awaiting approval" accent="#0F766E" />
      </div>

      {/* Oldest-first breakdown */}
      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100">
          <h3 className="font-display font-bold text-slate-800">Comp time breakdown (oldest first)</h3>
          <p className="text-xs text-slate-400 mt-0.5">These are drawn down in this order when a usage request is approved. No expiration — this rolls over as long as your balance stays at or under the 24-hour cap.</p>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
                <th className="px-6 py-3 font-semibold">Date worked</th>
                <th className="px-4 py-3 font-semibold">Event</th>
                <th className="px-4 py-3 font-semibold">Hours remaining</th>
                <th className="px-6 py-3 font-semibold">How calculated</th>
              </tr>
            </thead>
            <tbody>
              {breakdown.length === 0 && (
                <tr><td colSpan={4} className="px-6 py-8 text-center text-slate-400">No comp time on the books right now.</td></tr>
              )}
              {breakdown.map(r => (
                <tr key={r.id} className="border-b border-slate-50 last:border-0">
                  <td className="px-6 py-3 whitespace-nowrap">{fmtDate(r.dateWorked)}</td>
                  <td className="px-4 py-3 text-slate-500 max-w-[160px] truncate">{r.eventReason}</td>
                  <td className="px-4 py-3 font-semibold">{r.remainingHours}</td>
                  <td className="px-6 py-3 text-slate-500 max-w-[220px] text-xs">{r.calcExplanation || "—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>


      <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
        <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-6 h-fit">
          <div className="flex gap-2 mb-4">
            <button className={`tab-btn ${tab === "earned" ? "active" : ""}`} onClick={() => { setTab("earned"); setError(""); }}>Log time earned</button>
            <button className={`tab-btn ${tab === "used" ? "active" : ""}`} onClick={() => { setTab("used"); setError(""); }}>Request to use</button>
          </div>

          {tab === "earned" ? (
            <form onSubmit={submitEarned} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Date of activity/event worked</label>
                <input type="date" value={eDate} max={isoToday} onChange={e => setEDate(e.target.value)} className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />

            title="Time used" rows={used} exportName={`${me.name}_comp_time_used.csv`}
            columns={[
              { label: "Date", render: r => fmtDate(r.dateOfLeave) },

              { label: "Hours", render: r => r.totalHours },

    </div>
  );

function HistoryTable({ title, rows, columns, csvHeaders, exportName }) {
  return (
    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 className="font-display font-bold text-slate-800">{title}</h3>
        <button onClick={() => downloadCsv(exportName, toCsv(rows, csvHeaders))} className="text-xs font-semibold text-[#1E3A5F] hover:underline">Export CSV</button>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs uppercase tracking-wide text-slate-500 border-b border-slate-100">
              {columns.map(c => <th key={c.label} className="px-6 py-3 font-semibold">{c.label}</th>)}
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && <tr><td colSpan={columns.length} className="px-6 py-8 text-center text-slate-400">Nothing here yet.</td></tr>}
            {rows.map(r => (

        </table>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   Starting Balance — manager-only: credit pre-existing balances
--------------------------------------------------------- */
function StartingBalancePanel({ employees, onAdd }) {
  const [employeeId, setEmployeeId] = useState("");
  const [hours, setHours] = useState("");
  const [note, setNote] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit(ev) {
    ev.preventDefault();
    setError("");
    const hoursNum = parseFloat(hours);
    if (!employeeId) { setError("Choose an employee."); return; }
    if (isNaN(hoursNum) || hoursNum <= 0) { setError("Enter a positive number of hours."); return; }
    if (hoursNum > MAX_ACCRUAL_HOURS) { setError(`Cannot exceed the ${MAX_ACCRUAL_HOURS}-hour contract cap.`); return; }

    setBusy(true);
    try {
      const employee = employees.find(e => e.id === employeeId);
      await onAdd(employee, roundToQuarter(hoursNum), note.trim());
      setEmployeeId(""); setHours(""); setNote("");
    } catch (e) {
      setError(e.message || "Something went wrong.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div className="px-6 py-4 border-b border-slate-100">
        <h3 className="font-display font-bold text-slate-800">Add starting balance</h3>
        <p className="text-xs text-slate-400 mt-0.5">For crediting comp time an employee already had before this system — manager/admin only. Credited immediately as approved, no overtime calculation applied.</p>
      </div>
      <form onSubmit={submit} className="px-6 py-4 flex flex-wrap gap-3 items-end">
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">Employee</label>
          <select value={employeeId} onChange={e => setEmployeeId(e.target.value)} className="rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white min-w-[200px]">
            <option value="">Choose…</option>
            {employees.map(e => <option key={e.id} value={e.id}>{e.name} ({e.school})</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">Hours to credit</label>
          <input type="number" step="0.25" min="0" value={hours} onChange={e => setHours(e.target.value)} placeholder="e.g. 12" className="rounded-lg border border-slate-300 px-3 py-2 text-sm w-32" />
        </div>
        <div className="flex-1 min-w-[180px]">
          <label className="block text-xs font-semibold text-slate-600 mb-1">Note (optional)</label>
          <input type="text" value={note} onChange={e => setNote(e.target.value)} placeholder="e.g. Carried over from prior spreadsheet" className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
        </div>
        <button type="submit" disabled={busy} className="text-sm font-semibold px-4 py-2 rounded-lg bg-[#1E3A5F] text-white hover:bg-[#16304f] disabled:opacity-50">
          {busy ? "Adding…" : "Add"}
        </button>
      </form>
      {error && <p className="px-6 pb-4 text-sm text-rose-600">{error}</p>}
      {employees.length === 0 && <p className="px-6 pb-4 text-xs text-slate-400">No employees have signed into the app at your school(s) yet — they need to log in at least once before you can credit a starting balance.</p>}
    </div>
  );
}

/* ---------------------------------------------------------
   All Requests — searchable full history + edit/void controls
--------------------------------------------------------- */
function AllRequestsPanel({ allEarned, allUsed, managers, onApplyEdit, onVoidEarned, onVoidUsed }) {
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo] = useState("");

  function matches(row, dateField) {
    if (search && !row.employeeName.toLowerCase().includes(search.toLowerCase())) return false;
    if (statusFilter !== "all" && row.status !== statusFilter) return false;
    if (dateFrom && row[dateField] < dateFrom) return false;
    if (dateTo && row[dateField] > dateTo) return false;
    return true;
  }

  const filteredEarned = allEarned.filter(r => matches(r, "dateWorked")).sort((a,b) => new Date(b.dateWorked) - new Date(a.dateWorked));
  const filteredUsed = allUsed.filter(r => matches(r, "dateOfLeave")).sort((a,b) => new Date(b.dateOfLeave) - new Date(a.dateOfLeave));

  return (
    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div className="px-6 py-4 border-b border-slate-100">
        <h3 className="font-display font-bold text-slate-800">All requests</h3>
        <p className="text-xs text-slate-400 mt-0.5">Every request submitted at your school(s), regardless of status.</p>
      </div>
      <div className="px-6 py-4 border-b border-slate-100 flex flex-wrap gap-3 items-end">
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">Search employee</label>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Name…" className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" />
        </div>
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">Status</label>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm bg-white">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="voided">Voided</option>
          </select>
        </div>
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">From</label>
          <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" />
        </div>
        <div>
          <label className="block text-xs font-semibold text-slate-600 mb-1">To</label>
          <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm" />
        </div>
        {(search || statusFilter !== "all" || dateFrom || dateTo) && (
          <button onClick={() => { setSearch(""); setStatusFilter("all"); setDateFrom(""); setDateTo(""); }} className="text-xs font-semibold text-slate-500 hover:text-slate-700 underline">
            Clear filters
          </button>
        )}
      </div>

      <div className="px-6 pt-4 pb-1 flex items-center justify-between">
        <p className="text-xs font-semibold uppercase tracking-wide text-slate-500">Earned ({filteredEarned.length})</p>
        <button
          onClick={() => downloadCsv("comp_time_earned_export.csv", toCsv(filteredEarned, [
            { label: "Employee", get: r => r.employeeName }, { label: "Date Worked", get: r => r.dateWorked },
            { label: "Event/Reason", get: r => r.eventReason }, { label: "Hours", get: r => r.compHoursRounded },

function EditableEarnedRow({ row, managers, onApplyEdit, onVoidEarned }) {
  const [editing, setEditing] = useState(false);
  const [reason, setReason] = useState(row.eventReason);
  const [adminId, setAdminId] = useState(row.adminOverseeingUserId);
  const [date, setDate] = useState(row.dateWorked);

  const isUntouched = (row.remainingHours || 0) === (row.compHoursRounded || 0);
  const canVoid = row.status === "approved" && isUntouched;
  const dateLocked = !isUntouched;

  async function save() {
    if (reason.trim() !== row.eventReason) await onApplyEdit("earned", row.id, "eventReason", reason.trim(), row);
    if (adminId !== row.adminOverseeingUserId) {
      await onApplyEdit("earned", row.id, "adminOverseeingUserId", adminId, row);
    }
    if (!dateLocked && date !== row.dateWorked) await onApplyEdit("earned", row.id, "dateWorked", date, row);
    setEditing(false);
  }

  function handleVoid() {
    const note = window.prompt("Reason for voiding this entry? (required, visible to the employee)");
    if (note && note.trim()) onVoidEarned(row, note.trim());
  }

  if (row.status === "voided") {
    return (
      <tr className="border-b border-slate-50 last:border-0 opacity-60">
        <td className="px-6 py-3 font-medium text-slate-800">{row.employeeName}</td>
        <td className="px-4 py-3 whitespace-nowrap">{fmtDate(row.dateWorked)}</td>
        <td className="px-4 py-3 text-slate-500 max-w-[140px] truncate">{row.eventReason}</td>
        <td className="px-4 py-3 text-slate-500 whitespace-nowrap">—</td>
        <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.extraHours != null ? `${row.regularHours} reg + ${row.extraHours} extra` : "—"}</td>
        <td className="px-4 py-3">{row.compHoursRounded}</td>
        <td className="px-4 py-3"><StatusBadge status="voided" /></td>
        <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.decidedByName || "—"}</td>
        <td className="px-6 py-3 text-right text-xs text-slate-400" title={row.voidNote}>{row.voidNote}</td>
      </tr>
    );
  }

  if (editing) {
    return (
      <tr className="border-b border-slate-50 last:border-0 bg-slate-50/60">
        <td className="px-6 py-3 font-medium text-slate-800">{row.employeeName}</td>
        <td className="px-4 py-3">
          <input type="date" value={date} disabled={dateLocked} onChange={e => setDate(e.target.value)} className="rounded border border-slate-300 px-2 py-1 text-xs w-32 disabled:bg-slate-100 disabled:text-slate-400" />
          {dateLocked && <p className="text-[10px] text-orange-600 mt-0.5">Already used — void to correct.</p>}
        </td>
        <td className="px-4 py-3"><input type="text" value={reason} onChange={e => setReason(e.target.value)} className="rounded border border-slate-300 px-2 py-1 text-xs w-full" /></td>
        <td className="px-4 py-3">
          <select value={adminId} onChange={e => setAdminId(e.target.value)} className="rounded border border-slate-300 px-2 py-1 text-xs bg-white">
            {managers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        </td>
        <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.extraHours != null ? `${row.regularHours} reg + ${row.extraHours} extra` : "—"}</td>
        <td className="px-4 py-3">{row.compHoursRounded}</td>
        <td className="px-4 py-3"><StatusBadge status={row.status} /></td>
        <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.decidedByName || "—"}</td>
        <td className="px-6 py-3">
          <div className="flex gap-2 justify-end">
            <button onClick={() => setEditing(false)} className="text-xs font-semibold px-2 py-1 rounded border border-slate-200 text-slate-600 hover:bg-slate-100">Cancel</button>
            <button onClick={save} className="text-xs font-semibold px-2 py-1 rounded bg-[#1E3A5F] text-white hover:bg-[#16304f]">Save</button>
          </div>
        </td>
      </tr>
    );
  }

  return (
    <tr className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
      <td className="px-6 py-3 font-medium text-slate-800">{row.employeeName}</td>
      <td className="px-4 py-3 whitespace-nowrap">{fmtDate(row.dateWorked)}</td>
      <td className="px-4 py-3 text-slate-500 max-w-[140px] truncate">{row.eventReason}</td>
      <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{(managers.find(m => m.id === row.adminOverseeingUserId) || {}).name || "—"}</td>
      <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.extraHours != null ? `${row.regularHours} reg + ${row.extraHours} extra` : "—"}</td>
      <td className="px-4 py-3">{row.compHoursRounded}</td>
      <td className="px-4 py-3">
        <StatusBadge status={row.status} />
        {row.edits && row.edits.length > 0 && <span className="badge badge-neutral ml-1">Adjusted</span>}
      </td>
      <td className="px-4 py-3 text-slate-500 whitespace-nowrap">{row.decidedByName || "—"}</td>
      <td className="px-6 py-3">
        <div className="flex gap-2 justify-end">
          <button onClick={() => setEditing(true)} className="text-xs font-semibold px-2 py-1 rounded border border-slate-200 text-slate-600 hover:bg-slate-100">Edit</button>
          {row.status === "approved" && (
            canVoid
              ? <button onClick={handleVoid} className="text-xs font-semibold px-2 py-1 rounded border border-rose-200 text-rose-700 hover:bg-rose-50">Void</button>
              : <span className="text-xs text-slate-400" title="Already partially or fully used — contact superadmin to correct.">Void unavailable</span>
          )}
        </div>
      </td>
    </tr>
  );
}

/* ---------------------------------------------------------
   Root App
--------------------------------------------------------- */
function App() {
  const [authUser, setAuthUser] = useState(undefined); // undefined = loading, null = signed out
  const [me, setMe] = useState(null);
  const [view, setView] = useState("employee");
  const [earned, setEarned] = useState([]);
  const [used, setUsed] = useState([]);
  const [managers, setManagers] = useState([]);
  const [pendingEarned, setPendingEarned] = useState([]);
  const [pendingUsed, setPendingUsed] = useState([]);
  const [allEarnedForSchool, setAllEarnedForSchool] = useState([]);
  const [allUsedForSchool, setAllUsedForSchool] = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [employeesAtMySchools, setEmployeesAtMySchools] = useState([]);
  const [auditLog, setAuditLog] = useState([]);

  useEffect(() => auth.onAuthStateChanged(u => setAuthUser(u)), []);

  // Load / listen to my user profile doc — create it on first sign-in
  // (previously a Cloud Function did this; the free plan has none, so the
  // client does it, permitted by Firestore rules for a self-created doc).
  useEffect(() => {
    if (!authUser) { setMe(null); return; }
    const ref = db.collection("users").doc(authUser.uid);
    ref.get().then(snap => {
      if (!snap.exists) {
        return ref.set({
          email: (authUser.email || "").toLowerCase(),
          name: authUser.displayName || authUser.email,
          school: null,
          isManagerFor: [],
          isSuperAdmin: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
    });
    return ref.onSnapshot(snap => {
      if (snap.exists) setMe({ id: authUser.uid, ...snap.data() });
    });
  }, [authUser]);

  // My earned/used requests
  useEffect(() => {
    if (!me) return;
    const u1 = db.collection("earnedRequests").where("employeeId", "==", me.id)
      .onSnapshot(s => setEarned(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection("usedRequests").where("employeeId", "==", me.id)
      .onSnapshot(s => setUsed(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { u1(); u2(); };
  }, [me && me.id]);

  // Managers for my school
  useEffect(() => {
    if (!me || !me.school) return;
    return db.collection("users").where("isManagerFor", "array-contains", me.school)
      .onSnapshot(s => setManagers(s.docs.map(d => ({ id: d.id, name: d.data().name }))));
  }, [me && me.school]);

  const canManage = me && Array.isArray(me.isManagerFor) && me.isManagerFor.length > 0;

  // Full user directory — only fetched (and only readable, per Firestore
  // rules) when the current user is a superadmin.
  useEffect(() => {
    if (!me || !me.isSuperAdmin) { setAllUsers([]); return; }
    return db.collection("users").onSnapshot(s => setAllUsers(s.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, [me && me.id, me && me.isSuperAdmin]);

  // Employees at the schools I manage — used for the "add starting balance"
  // picker. Firestore rules allow a manager to read user docs whose school
  // matches one they manage.
  useEffect(() => {
    if (!canManage) { setEmployeesAtMySchools([]); return; }
    const schools = me.isManagerFor.slice(0, 10);
    return db.collection("users").where("school", "in", schools)
      .onSnapshot(s => setEmployeesAtMySchools(s.docs.map(d => ({ id: d.id, ...d.data() }))));
  }, [canManage, me && JSON.stringify(me.isManagerFor)]);

  // Pending queues for schools I manage
  useEffect(() => {
    if (!canManage) return;
    const schools = me.isManagerFor.slice(0, 10); // Firestore 'in' query limit
    const u1 = db.collection("earnedRequests").where("school", "in", schools).where("status", "==", "pending")
      .onSnapshot(s => setPendingEarned(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u2 = db.collection("usedRequests").where("school", "in", schools).where("status", "==", "pending")
      .onSnapshot(s => setPendingUsed(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u3 = db.collection("auditLog").orderBy("ts", "desc").limit(100)
      .onSnapshot(s => setAuditLog(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    // Full history (all statuses) at the manager's schools, for the searchable All Requests view.
    const u4 = db.collection("earnedRequests").where("school", "in", schools)
      .onSnapshot(s => setAllEarnedForSchool(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    const u5 = db.collection("usedRequests").where("school", "in", schools)
      .onSnapshot(s => setAllUsedForSchool(s.docs.map(d => ({ id: d.id, ...d.data() }))));
    return () => { u1(); u2(); u3(); u4(); u5(); };
  }, [canManage, me && JSON.stringify(me.isManagerFor)]);

  const handleChooseSchool = useCallback(async (school) => {
    await db.collection("users").doc(me.id).update({ school });
  }, [me]);

  const handleSubmitEarned = useCallback(async (payload) => {
    await db.collection("earnedRequests").add({
      employeeId: me.id, employeeName: me.name, school: me.school,
      status: "pending", submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
      decidedAt: null, ...payload,
    });
  }, [me]);

  const handleSubmitUsed = useCallback(async (payload) => {
    await db.collection("usedRequests").add({
      employeeId: me.id, employeeName: me.name, school: me.school,
      status: "pending", submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
      decidedAt: null, ...payload,
    });
  }, [me]);

  const handleDecide = useCallback(async (kind, id, action) => {
    try {
      const collection = kind === "earned" ? "earnedRequests" : "usedRequests";
      const ref = db.collection(collection).doc(id);

      if (action === "reject") {
        await ref.update({ status: "rejected", decidedAt: firebase.firestore.FieldValue.serverTimestamp(), decidedByName: me.name });
        return;
      }

      if (kind === "earned") {
        await ref.update({ status: "approved", decidedAt: firebase.firestore.FieldValue.serverTimestamp(), decidedByName: me.name });
        return;
      }

      // Usage request approval: draw down the employee's oldest unexpired
      // earned batches first (FIFO), as a single Firestore transaction run
      // under the approving manager's own authenticated session (there's
      // no Cloud Function to do this server-side on the free plan).
      const usedSnap = await ref.get();
      const usedData = usedSnap.data();

      const earnedSnap = await db.collection("earnedRequests")
        .where("employeeId", "==", usedData.employeeId)
        .where("status", "==", "approved")
        .orderBy("dateWorked", "asc")
        .get();

      const eligible = earnedSnap.docs.filter(d => {
        const e = d.data();
        return (e.remainingHours || 0) > 0;
      });

      let remainingToCover = usedData.totalHours;
      const allocations = [];
      for (const d of eligible) {
        if (remainingToCover <= 0) break;
        const e = d.data();
        const draw = Math.min(e.remainingHours, remainingToCover);
        allocations.push({ earnedRequestId: d.id, hoursDrawn: draw });
        remainingToCover = roundToQuarter(remainingToCover - draw);
      }

      if (remainingToCover > 0) {
        alert("This can no longer be approved as-is — the employee's available balance has changed since they submitted.");
        return;
      }

      const batch = db.batch();
      for (const alloc of allocations) {
        const eDoc = eligible.find(d => d.id === alloc.earnedRequestId);
        const newRemaining = roundToQuarter(eDoc.data().remainingHours - alloc.hoursDrawn);
        batch.update(db.collection("earnedRequests").doc(alloc.earnedRequestId), { remainingHours: newRemaining });
      }
      batch.update(ref, {
        status: "approved",
        decidedAt: firebase.firestore.FieldValue.serverTimestamp(),
        decidedByName: me.name,
        allocations,
      });
      await batch.commit();
    } catch (e) {
      alert(e.message || "Something went wrong processing that decision.");
    }
  }, [me]);

  const handleApplyEdit = useCallback(async (kind, id, field, newValue, currentRow) => {
    const collection = kind === "earned" ? "earnedRequests" : "usedRequests";
    const ref = db.collection(collection).doc(id);
    const oldValue = currentRow[field];

    const updates = { [field]: newValue };

    const editEntry = {
      ts: new Date().toISOString(), field,
      oldValue: oldValue ?? "", newValue: newValue ?? "",
      editedByName: me.name,
    };
    updates.edits = firebase.firestore.FieldValue.arrayUnion(editEntry);

    await ref.update(updates);
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} adjusted ${currentRow.employeeName}'s ${kind === "earned" ? "earned" : "usage"} request (${field}: "${oldValue}" → "${newValue}")`,
      school: currentRow.school,
    });
  }, [me]);

  const handleVoidEarned = useCallback(async (row, note) => {
    if ((row.remainingHours || 0) !== (row.compHoursRounded || 0)) {
      alert("This entry has already been partially or fully used and can't be voided automatically — contact your superadmin to correct it manually.");
      return;
    }
    await db.collection("earnedRequests").doc(row.id).update({
      status: "voided",
      voidedAt: firebase.firestore.FieldValue.serverTimestamp(),
      voidedByName: me.name,
      voidNote: note,
    });
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} voided ${row.employeeName}'s earned comp time (${row.compHoursRounded} hrs) — ${note}`,
      school: row.school,
    });
  }, [me]);

  const handleVoidUsed = useCallback(async (row, note) => {
    const batch = db.batch();
    for (const alloc of row.allocations || []) {
      const eRef = db.collection("earnedRequests").doc(alloc.earnedRequestId);
      const eDoc = await eRef.get();
      if (eDoc.exists) {
        const current = eDoc.data().remainingHours || 0;
        batch.update(eRef, { remainingHours: roundToQuarter(current + alloc.hoursDrawn) });
      }
    }
    batch.update(db.collection("usedRequests").doc(row.id), {
      status: "voided",
      voidedAt: firebase.firestore.FieldValue.serverTimestamp(),
      voidedByName: me.name,
      voidNote: note,
    });
    await batch.commit();
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} voided ${row.employeeName}'s comp time usage (${row.totalHours} hrs) — hours credited back — ${note}`,
      school: row.school,
    });
  }, [me]);

  const handleAddManagerSchool = useCallback(async (uid, school) => {
    await db.collection("users").doc(uid).update({ isManagerFor: firebase.firestore.FieldValue.arrayUnion(school) });
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} granted manager access for ${school}`, school,
    });
  }, [me]);

  const handleRemoveManagerSchool = useCallback(async (uid, school) => {
    await db.collection("users").doc(uid).update({ isManagerFor: firebase.firestore.FieldValue.arrayRemove(school) });
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} revoked manager access for ${school}`, school,
    });
  }, [me]);

  const handleToggleSuperAdmin = useCallback(async (uid, value) => {
    if (uid === me.id && !value) {
      if (!window.confirm("This will remove your own superadmin access. Continue?")) return;
    }
    await db.collection("users").doc(uid).update({ isSuperAdmin: value });
  }, [me]);

  const handleAddStartingBalance = useCallback(async (employee, hours, note) => {
    await db.collection("earnedRequests").add({
      employeeId: employee.id,
      employeeName: employee.name,
      school: employee.school,
      status: "approved",
      submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
      decidedAt: firebase.firestore.FieldValue.serverTimestamp(),
      decidedByName: me.name,
      eventReason: note || "Starting balance carried over from previous system",
      dateWorked: isoToday,
      extraHours: null, regularHours: null, otApplied: null,
      compHoursExact: hours, compHoursRounded: hours, remainingHours: hours,
      calcExplanation: "Migrated starting balance — no overtime calculation applied.",
      adminOverseeingUserId: me.id,
      preApproved: true,
      isStartingBalance: true,
      managerNotified: true, // administrative entry — no approval-needed notification to send
    });
    await db.collection("auditLog").add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      action: `${me.name} credited ${employee.name} with ${hours} starting-balance comp hours — ${note || "no note"}`,
      school: employee.school,
    });
  }, [me]);

  if (authUser === undefined) {
    return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>;
  }
  if (!authUser) {
    return <LoginScreen />;
  }
  if (!me) {
    return <div className="min-h-screen flex items-center justify-center text-slate-400">Setting up your account…</div>;
  }
  if (!me.school) {
    return <SchoolPicker onChoose={handleChooseSchool} />;
  }

  return (
    <div className="min-h-screen">
      <TopBar view={view} setView={setView} me={me} canManage={canManage} onSignOut={() => auth.signOut()} />
      <main className="max-w-6xl mx-auto px-6 py-8">
        {view === "admin" && me.isSuperAdmin ? (
          <AdminPanel
            allUsers={allUsers}
            onAddSchool={handleAddManagerSchool}
            onRemoveSchool={handleRemoveManagerSchool}
            onToggleSuperAdmin={handleToggleSuperAdmin}
          />
        ) : view === "employee" || !canManage ? (
          <EmployeeView me={me} earned={earned} used={used} managers={managers} onSubmitEarned={handleSubmitEarned} onSubmitUsed={handleSubmitUsed} />
        ) : (
          <ManagerView
            me={me} pendingEarned={pendingEarned} pendingUsed={pendingUsed} auditLog={auditLog} onDecide={handleDecide}
            allEarned={allEarnedForSchool} allUsed={allUsedForSchool} managers={managers}
            onApplyEdit={handleApplyEdit} onVoidEarned={handleVoidEarned} onVoidUsed={handleVoidUsed}
            employeesAtMySchools={employeesAtMySchools} onAddStartingBalance={handleAddStartingBalance}
          />
        )}
      </main>
      <footer className="max-w-6xl mx-auto px-6 pb-8 text-xs text-slate-400">
        Signed in as {me.email}. Data is stored in Firestore and shared across all district devices.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
